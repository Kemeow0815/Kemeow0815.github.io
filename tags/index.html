<script>
(function(){
  // Mobile nav toggle
  var btn = document.getElementById('btnNavToggle');
  var nav = document.getElementById('sectionBar');
  var hamburger = document.getElementById('hamburger');
  if (!btn || !nav) return;
  btn.addEventListener('click', function(){
    nav.classList.toggle('top-bar__nav--open');
    if (hamburger) hamburger.classList.toggle('is-active');
  });

  // Submenu toggle for mobile
  var navItemsWithChildren = document.querySelectorAll('.nav-item--has-children');
  navItemsWithChildren.forEach(function(item) {
    item.addEventListener('click', function(e) {
      // Only handle click on mobile
      if (window.innerWidth > 768) return;
      
      e.preventDefault();
      e.stopPropagation();
      
      var menuId = this.getAttribute('data-menu-id');
      var submenu = document.getElementById('submenu-' + menuId);
      
      // Close other open submenus
      navItemsWithChildren.forEach(function(otherItem) {
        if (otherItem !== item) {
          var otherMenuId = otherItem.getAttribute('data-menu-id');
          var otherSubmenu = document.getElementById('submenu-' + otherMenuId);
          if (otherSubmenu && otherSubmenu.classList.contains('nav-submenu--open')) {
            otherSubmenu.classList.remove('nav-submenu--open');
            otherItem.classList.remove('nav-item--expanded');
          }
        }
      });
      
      // Toggle current submenu
      if (submenu) {
        submenu.classList.toggle('nav-submenu--open');
        this.classList.toggle('nav-item--expanded');
      }
    });
  });

  // Close mobile nav when clicking on simple nav items
  nav.querySelectorAll('.nav-item:not(.nav-item--has-children)').forEach(function(item){
    item.addEventListener('click', function(){
      nav.classList.remove('top-bar__nav--open');
      if (hamburger) hamburger.classList.remove('is-active');
    });
  });

  // Theme toggle with performance optimization
  var themeBtn = document.getElementById('btnTheme');
  if (themeBtn) {
    themeBtn.addEventListener('click', function() {
      var currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
      var newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      // Add class to disable transitions during theme change
      document.body.classList.add('theme-changing');
      
      // Use requestAnimationFrame for smooth theme switch
      requestAnimationFrame(function() {
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        
        // Remove the class after theme change is complete
        requestAnimationFrame(function() {
          document.body.classList.remove('theme-changing');
        });
      });
    });
  }
})();
</script>

  <script>function show_runtime() {

  var Y = new Date();
  var T = Y.getTime() - X.getTime();
  var M = 24 * 60 * 60 * 1000;
  var a = T / M;
  var A = Math.floor(a);
  var b = (a - A) * 24;
  var B = Math.floor(b);
  var c = (b - B) * 60;
  var C = Math.floor((b - B) * 60);
  var D = Math.floor((c - C) * 60);
  document.getElementById("runtime_span").innerHTML = "⏱️本站已运行 " + A + "天" + B + "小时" + C + "分" + D + "秒";
  setTimeout(show_runtime, 1000);
}

  <script>
  (function() {
    // 页面加载完成后隐藏加载动画
    function hideLoadingOverlay() {
      const overlay = document.getElementById('loading-overlay');
      if (overlay) {
        overlay.classList.add('fade-out');
        setTimeout(function() {
          overlay.style.display = 'none';
        }, 600);
      }
    }
    
    // 等待页面完全加载
    if (document.readyState === 'complete') {
      hideLoadingOverlay();
    } else {
      window.addEventListener('load', hideLoadingOverlay);
    }
  })();
  </script>
  

  <!-- 流星背景脚本 - 性能优化 -->
  <script>
  (function() {
    const starsContainer = document.getElementById('bg-stars');
    if (!starsContainer) return;
    
    // 检测移动端和性能模式
    const isMobile = window.matchMedia('(max-width: 750px)').matches;
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    
    // 根据设备调整流星数量
    const starCount = isMobile ? 15 : (prefersReducedMotion ? 0 : 25);
    
    // 使用 DocumentFragment 批量添加
    const fragment = document.createDocumentFragment();
    
    for (let i = 0; i < starCount; i++) {
      const star = document.createElement('div');
      star.className = 'bg-star';
      
      // 随机参数 - 使用整数避免过多重绘
      const topOffset = Math.floor(Math.random() * 130) + 'vh';
      const fallDuration = (Math.floor(Math.random() * 8) + 6) + 's';
      const fallDelay = (Math.floor(Math.random() * 15)) + 's';
      
      star.style.setProperty('--top-offset', topOffset);
      star.style.setProperty('--fall-duration', fallDuration);
      star.style.setProperty('--fall-delay', fallDelay);
      
      fragment.appendChild(star);
    }
    
    starsContainer.appendChild(fragment);
  })();
  </script>
