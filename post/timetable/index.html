<script>
(function(){
  // Mobile nav toggle
  var btn = document.getElementById('btnNavToggle');
  var nav = document.getElementById('sectionBar');
  var hamburger = document.getElementById('hamburger');
  if (!btn || !nav) return;
  btn.addEventListener('click', function(){
    nav.classList.toggle('top-bar__nav--open');
    if (hamburger) hamburger.classList.toggle('is-active');
  });

  // Submenu toggle for mobile
  var navItemsWithChildren = document.querySelectorAll('.nav-item--has-children');
  navItemsWithChildren.forEach(function(item) {
    item.addEventListener('click', function(e) {
      // Only handle click on mobile
      if (window.innerWidth > 768) return;
      
      e.preventDefault();
      e.stopPropagation();
      
      var menuId = this.getAttribute('data-menu-id');
      var submenu = document.getElementById('submenu-' + menuId);
      
      // Close other open submenus
      navItemsWithChildren.forEach(function(otherItem) {
        if (otherItem !== item) {
          var otherMenuId = otherItem.getAttribute('data-menu-id');
          var otherSubmenu = document.getElementById('submenu-' + otherMenuId);
          if (otherSubmenu && otherSubmenu.classList.contains('nav-submenu--open')) {
            otherSubmenu.classList.remove('nav-submenu--open');
            otherItem.classList.remove('nav-item--expanded');
          }
        }
      });
      
      // Toggle current submenu
      if (submenu) {
        submenu.classList.toggle('nav-submenu--open');
        this.classList.toggle('nav-item--expanded');
      }
    });
  });

  // Close mobile nav when clicking on simple nav items
  nav.querySelectorAll('.nav-item:not(.nav-item--has-children)').forEach(function(item){
    item.addEventListener('click', function(){
      nav.classList.remove('top-bar__nav--open');
      if (hamburger) hamburger.classList.remove('is-active');
    });
  });

  // Theme toggle with performance optimization
  var themeBtn = document.getElementById('btnTheme');
  if (themeBtn) {
    themeBtn.addEventListener('click', function() {
      var currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
      var newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      // Add class to disable transitions during theme change
      document.body.classList.add('theme-changing');
      
      // Use requestAnimationFrame for smooth theme switch
      requestAnimationFrame(function() {
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        
        // Remove the class after theme change is complete
        requestAnimationFrame(function() {
          document.body.classList.remove('theme-changing');
        });
      });
    });
  }
})();
</script>

<script>
(function() {
  // 课程表数据配置 - 支持从主题配置读取或使用默认值
  const dataUrlFromConfig = '/timetable/大三下.json';
  const TIMETABLE_CONFIG = {
    dataUrl: dataUrlFromConfig || './timetable/大三下.json',
    startDate: '2026-03-02',
    maxWeek: 20.000000,
    nodes: 11.000000
  };

  // 状态管理
  let timetableData = null;
  let currentWeek = 1;
  let actualCurrentWeek = 1;

  // 工具函数：计算当前周
  function resolveCurrentWeek(startDateText, maxWeek) {
    const parts = startDateText.split('-').map(Number);
    if (parts.length !== 3) return 1;
    const [year, month, day] = parts;
    const startDate = new Date(year, month - 1, day);
    const now = new Date();
    const msPerDay = 24 * 60 * 60 * 1000;
    const diffDays = Math.floor((now.getTime() - startDate.getTime()) / msPerDay);
    const week = Math.floor(diffDays / 7) + 1;
    return Math.max(1, Math.min(week, maxWeek));
  }

  // 工具函数：解析时间
  function parseTimeToMinute(text) {
    const parts = String(text || '').split(':');
    if (parts.length !== 2) return null;
    const hour = Number(parts[0]);
    const minute = Number(parts[1]);
    if (!Number.isFinite(hour) || !Number.isFinite(minute)) return null;
    return hour * 60 + minute;
  }

  // 工具函数：格式化持续时间
  function formatDuration(totalMinutes) {
    const safeMinutes = Math.max(0, Math.floor(totalMinutes));
    const hours = Math.floor(safeMinutes / 60);
    const minutes = safeMinutes % 60;
    if (hours > 0 && minutes > 0) return `${hours}小时${minutes}分钟`;
    if (hours > 0) return `${hours}小时`;
    return `${minutes}分钟`;
  }

  // 工具函数：生成课程颜色
  function generateCourseColor(courseName, courseId) {
    // 使用预定义的颜色或根据名称生成
    const colors = [
      '#ffb500', '#9c27b0', '#ffcc00', '#003eff', '#6000af',
      '#0081ff', '#ff0000', '#00c492', '#f321a9', '#ff4c17', '#ff7589'
    ];
    return colors[courseId % colors.length] || '#6b7280';
  }

  // 加载课程表数据
  async function loadTimetableData() {
    try {
      const response = await fetch(TIMETABLE_CONFIG.dataUrl);
      if (!response.ok) throw new Error('加载失败');
      timetableData = await response.json();
      
      // 计算当前周
      actualCurrentWeek = resolveCurrentWeek(
        timetableData.settings?.startDate || TIMETABLE_CONFIG.startDate,
        timetableData.settings?.maxWeek || TIMETABLE_CONFIG.maxWeek
      );
      currentWeek = actualCurrentWeek;
      
      // 更新页面
      updatePage();
    } catch (error) {
      console.error('课程表加载失败:', error);
      document.getElementById('timetable-subtitle').textContent = '课表数据加载失败';
    }
  }

  // 获取指定周的课程
  function getWeekCourses(week) {
    if (!timetableData) return {};
    
    const coursesByDay = { 1: [], 2: [], 3: [], 4: [], 5: [] };
    const courseMap = new Map();
    
    // 建立课程定义映射
    timetableData.courses?.forEach(course => {
      courseMap.set(course.id, course);
    });

    // 筛选当前周的课程安排
    timetableData.schedules?.forEach(schedule => {
      if (week < schedule.startWeek || week > schedule.endWeek) return;
      if (schedule.day < 1 || schedule.day > 5) return;
      
      const courseDef = courseMap.get(schedule.id);
      if (!courseDef) return;

      const timeTable = timetableData.timeTable?.find(t => t.node === schedule.startNode);
      const endNode = Math.min(schedule.startNode + schedule.step - 1, timetableData.timeTable?.length || 11);
      const endTimeTable = timetableData.timeTable?.find(t => t.node === endNode);

      coursesByDay[schedule.day].push({
        id: schedule.id,
        name: courseDef.courseName,
        color: courseDef.color || generateCourseColor(courseDef.courseName, schedule.id),
        room: schedule.room || '未填写',
        teacher: schedule.teacher || '未填写',
        startNode: schedule.startNode,
        endNode: endNode,
        step: schedule.step,
        startWeek: schedule.startWeek,
        endWeek: schedule.endWeek,
        startTime: timeTable?.startTime || '--:--',
        endTime: endTimeTable?.endTime || '--:--',
        timeText: `${timeTable?.startTime || '--:--'} - ${endTimeTable?.endTime || '--:--'}`
      });
    });

    // 按节次排序
    Object.keys(coursesByDay).forEach(day => {
      coursesByDay[day].sort((a, b) => a.startNode - b.startNode);
    });

    return coursesByDay;
  }

  // 渲染课程表网格
  function renderTimetableGrid() {
    const tbody = document.getElementById('timetable-body');
    const coursesByDay = getWeekCourses(currentWeek);
    const timeTable = timetableData?.timeTable || [];
    
    let html = '';
    
    // 按节次生成行（每2节一行）
    for (let node = 1; node <= 10; node += 2) {
      const time1 = timeTable.find(t => t.node === node);
      const time2 = timeTable.find(t => t.node === node + 1);
      
      html += `
        <div class="timetable-row">
          <div class="timetable-time-cell">
            <div class="timetable-time-main">第 ${node}-${node + 1} 节</div>
            <div class="timetable-time-sub">${time1?.startTime || '--:--'} - ${time2?.endTime || '--:--'}</div>
          </div>
      `;
      
      // 周一到周五
      for (let day = 1; day <= 5; day++) {
        const dayCourses = coursesByDay[day]?.filter(c => 
          c.startNode === node || c.startNode === node + 1 ||
          (c.startNode < node && c.endNode >= node)
        ) || [];
        
        if (dayCourses.length > 0) {
          html += `<div class="timetable-cell">`;
          dayCourses.forEach(course => {
            html += `
              <div class="course-card" style="--course-color: ${course.color}">
                <div class="course-card__name">${course.name}</div>
                <div class="course-card__info">
                  <span class="course-card__room">${course.room}</span>
                  <span class="course-card__week">${course.startWeek}-${course.endWeek}周</span>
                </div>
              </div>
            `;
          });
          html += `</div>`;
        } else {
          html += `<div class="timetable-cell timetable-cell--empty">—</div>`;
        }
      }
      
      html += `</div>`;
    }
    
    tbody.innerHTML = html;
  }

  // 渲染移动端课程列表
  function renderTimetableMobile() {
    const container = document.getElementById('timetable-mobile');
    const coursesByDay = getWeekCourses(currentWeek);
    const dayNames = ['', '周一', '周二', '周三', '周四', '周五'];
    
    let html = '';
    
    for (let day = 1; day <= 5; day++) {
      const courses = coursesByDay[day] || [];
      
      html += `
        <div class="mobile-day-section">
          <h3 class="mobile-day-title">${dayNames[day]}</h3>
      `;
      
      if (courses.length > 0) {
        html += `<div class="mobile-courses">`;
        courses.forEach(course => {
          html += `
            <div class="mobile-course-card" style="--course-color: ${course.color}">
              <div class="mobile-course__header">
                <span class="mobile-course__name">${course.name}</span>
                <span class="mobile-course__week">${course.startWeek}-${course.endWeek}周</span>
              </div>
              <div class="mobile-course__details">
                <div class="mobile-course__detail">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                  </svg>
                  <span>${course.timeText}</span>
                </div>
                <div class="mobile-course__detail">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                  </svg>
                  <span>${course.room}</span>
                </div>
              </div>
            </div>
          `;
        });
        html += `</div>`;
      } else {
        html += `<p class="mobile-no-courses">本周暂无课程</p>`;
      }
      
      html += `</div>`;
    }
    
    container.innerHTML = html;
  }

  // 更新实时状态
  function updateLiveStatus() {
    const statusText = document.getElementById('live-status-text');
    const nextCourse = document.getElementById('live-next-course');
    const nextTime = document.getElementById('live-next-time');
    
    if (!timetableData) return;
    
    const now = new Date();
    const currentMinute = now.getHours() * 60 + now.getMinutes();
    const day = now.getDay() === 0 ? 7 : now.getDay();
    
    // 只显示周一到周五
    if (day > 5) {
      statusText.textContent = '周末';
      nextCourse.textContent = '--';
      nextTime.textContent = '';
      return;
    }
    
    const coursesByDay = getWeekCourses(currentWeek);
    const todayCourses = coursesByDay[day] || [];
    
    if (todayCourses.length === 0) {
      statusText.textContent = '今日无课';
      nextCourse.textContent = '--';
      nextTime.textContent = '';
      return;
    }
    
    // 添加时间信息到课程
    const coursesWithTime = todayCourses.map(course => {
      const startMinute = parseTimeToMinute(course.startTime);
      const endMinute = parseTimeToMinute(course.endTime);
      return { ...course, startMinute, endMinute };
    }).filter(c => c.startMinute !== null);
    
    // 查找当前状态
    let status = '无课';
    let nextCourseInfo = null;
    
    for (let i = 0; i < coursesWithTime.length; i++) {
      const course = coursesWithTime[i];
      
      if (currentMinute >= course.startMinute && currentMinute < course.endMinute) {
        status = `上课中：${course.name}`;
        nextCourseInfo = coursesWithTime[i + 1] || null;
        break;
      }
      
      if (currentMinute < course.startMinute) {
        nextCourseInfo = course;
        break;
      }
      
      // 检查是否在课间
      const next = coursesWithTime[i + 1];
      if (next && currentMinute >= course.endMinute && currentMinute < next.startMinute) {
        status = `课间休息`;
        nextCourseInfo = next;
        break;
      }
    }
    
    statusText.textContent = status;
    
    if (nextCourseInfo) {
      nextCourse.textContent = `${nextCourseInfo.name} @ ${nextCourseInfo.room}`;
      const remainMinutes = nextCourseInfo.startMinute - currentMinute;
      if (remainMinutes > 0) {
        nextTime.textContent = `（${formatDuration(remainMinutes)}后）`;
      } else {
        nextTime.textContent = '';
      }
    } else {
      nextCourse.textContent = '今日课程已结束';
      nextTime.textContent = '';
    }
  }

  // 更新页面
  function updatePage() {
    // 更新标题
    document.getElementById('timetable-subtitle').textContent = 
      timetableData?.settings?.tableName || '大三下课表';
    
    // 更新周次显示
    document.getElementById('current-week-num').textContent = currentWeek;
    
    // 更新当前周标签
    const badge = document.getElementById('current-week-badge');
    if (currentWeek === actualCurrentWeek) {
      badge.style.display = 'inline-block';
    } else {
      badge.style.display = 'none';
    }
    
    // 更新按钮状态
    document.getElementById('prev-week').disabled = currentWeek <= 1;
    document.getElementById('next-week').disabled = currentWeek >= (timetableData?.settings?.maxWeek || TIMETABLE_CONFIG.maxWeek);
    
    // 渲染课程表
    renderTimetableGrid();
    renderTimetableMobile();
    updateLiveStatus();
  }

  // 事件监听
  document.getElementById('prev-week').addEventListener('click', function() {
    if (currentWeek > 1) {
      currentWeek--;
      updatePage();
    }
  });

  document.getElementById('next-week').addEventListener('click', function() {
    const maxWeek = timetableData?.settings?.maxWeek || TIMETABLE_CONFIG.maxWeek;
    if (currentWeek < maxWeek) {
      currentWeek++;
      updatePage();
    }
  });

  // 初始化
  loadTimetableData();
  
  // 定时更新状态（每30秒）
  setInterval(updateLiveStatus, 30000);
  
  // 页面可见性变化时更新
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) {
      updateLiveStatus();
    }
  });
})();
</script>

  <!-- 流星背景脚本 - 性能优化 -->
  <script>
  (function() {
    const starsContainer = document.getElementById('bg-stars');
    if (!starsContainer) return;
    
    // 检测移动端和性能模式
    const isMobile = window.matchMedia('(max-width: 750px)').matches;
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    
    // 根据设备调整流星数量
    const starCount = isMobile ? 15 : (prefersReducedMotion ? 0 : 25);
    
    // 使用 DocumentFragment 批量添加
    const fragment = document.createDocumentFragment();
    
    for (let i = 0; i < starCount; i++) {
      const star = document.createElement('div');
      star.className = 'bg-star';
      
      // 随机参数 - 使用整数避免过多重绘
      const topOffset = Math.floor(Math.random() * 130) + 'vh';
      const fallDuration = (Math.floor(Math.random() * 8) + 6) + 's';
      const fallDelay = (Math.floor(Math.random() * 15)) + 's';
      
      star.style.setProperty('--top-offset', topOffset);
      star.style.setProperty('--fall-duration', fallDuration);
      star.style.setProperty('--fall-delay', fallDelay);
      
      fragment.appendChild(star);
    }
    
    starsContainer.appendChild(fragment);
  })();
  </script>
